[general]
output_dir = "data/output"
log_dir = "data/logs"
csv_filename = "title_review.csv"

[scanner]
video_extensions = [".mp4", ".mkv", ".avi", ".mov", ".flv", ".wmv", ".webm", ".m4v", ".ts"]
image_extensions = [".jpg", ".jpeg", ".png", ".bmp", ".webp", ".gif", ".tiff"]
top_keywords = 5

[vision]
max_image_size = 800
vlm_frames = 5
clip_frames = 5
max_keyframes = 8
keyframe_threshold = 30.0

[yolo]
model_type = "detect"
confidence = 0.5

[clip]
threshold = 0.25
multi_label = true
embedding_threshold = 0.75

[providers]
default = "gcli"
timeout = 90
retries = 3
batch_size = 3
delay = 2.0
