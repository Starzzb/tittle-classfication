[general]
output_dir = "data/output"
log_dir = "data/logs"
csv_filename = "title_review.csv"
device = "auto"  # auto / cuda / cpu

[scanner]
video_extensions = [
    ".mp4",
    ".mkv",
    ".avi",
    ".mov",
    ".flv",
    ".wmv",
    ".webm",
    ".m4v",
    ".ts",
]
image_extensions = [
    ".jpg",
    ".jpeg",
    ".png",
    ".bmp",
    ".webp",
    ".gif",
    ".tiff",
]
top_keywords = 5

[vision]
max_image_size = 800
vlm_frames = 10
clip_frames = 5
max_keyframes = 8
keyframe_threshold = 30.0

[yolo]
model_type = "detect"
confidence = 0.5

[yolo.comprehensive]
enabled = true
models = [
    "detect",
    "pose",
    "segment",
]
parallel_loading = true
weight_strategy = "confidence_based"
fallback_on_error = true

[yolo.comprehensive.custom_weights]
detect = 0.33
pose = 0.34
segment = 0.33

[clip]
threshold = 0.25
multi_label = true
embedding_threshold = 0.75

[providers]
default = "gcli"
timeout = 90
retries = 3
batch_size = 3
delay = 2.0

[audio]
enabled = true
provider = "mimo"
skip_silence = true
volume_threshold = 0.01
segment_duration = 30.0

[audio.adaptive]
enabled = false
min_segment = 15
max_segment = 60
low_energy_merge_threshold = 15
enter_threshold = 0.15
exit_threshold = 0.08
hangover_frames = 5
noise_alpha = 0.95
zcr_noise_threshold = 0.4
centroid_min_hz = 200
centroid_max_hz = 4000
entropy_threshold = 0.8

[audio.vad]
enabled = true
min_speech_ms = 250
min_silence_ms = 350
merge_gap = 1.5
min_keep_duration = 1.0
max_chunk = 25.0
long_gap = 3.0
min_duration = 1.0
min_speech_ratio = 0.3

[audio.postprocess]
enabled = false
max_subtitle_duration = 10
max_subtitle_chars = 100
filter_invalid = true
format_text = true

[mux]
enabled = false
auto_mux = false
output_format = "auto"
file_handling = "new"
subtitle_processing = "direct"
encoding = "utf-8"
language_detection = true
track_naming = "auto"
default_track = true
retry_failed = true
